<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Background circle with red (traditional Chinese color) -->
  <circle cx="64" cy="64" r="64" fill="#c8102e"/>
  
  <!-- Golden decorative circle border -->
  <circle cx="64" cy="64" r="58" fill="none" stroke="#d4af37" stroke-width="2"/>
  
  <!-- Stylized Chinese character-inspired design (abstract representation) -->
  <!-- Top horizontal stroke -->
  <rect x="36" y="32" width="56" height="6" rx="3" fill="#d4af37"/>
  
  <!-- Vertical center stroke -->
  <rect x="61" y="32" width="6" height="64" rx="3" fill="#d4af37"/>
  
  <!-- Middle horizontal stroke -->
  <rect x="36" y="58" width="56" height="6" rx="3" fill="#d4af37"/>
  
  <!-- Bottom horizontal stroke -->
  <rect x="36" y="84" width="56" height="6" rx="3" fill="#d4af37"/>
  
  <!-- Decorative dots (representing prosperity) -->
  <circle cx="44" cy="48" r="3" fill="#f4d03f"/>
  <circle cx="84" cy="48" r="3" fill="#f4d03f"/>
  <circle cx="44" cy="74" r="3" fill="#f4d03f"/>
  <circle cx="84" cy="74" r="3" fill="#f4d03f"/>
</svg>
